<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Shield Gradient -->
    <radialGradient id="shield" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#1e293b" />
    </radialGradient>

    <!-- Mjolnir Gold Gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Shield Background -->
  <circle cx="32" cy="32" r="24" fill="url(#shield)" />
  <circle cx="32" cy="32" r="23" fill="none" stroke="#94a3b8" stroke-width="1.5"
    stroke-opacity="0.6" />

  <!-- Mjolnir Silhouette (Rotated -45 deg and scaled 1.15x around center 32,32) -->
  <g transform="rotate(-45 32 32)">
    <g transform="translate(32 32) scale(1.15) translate(-32 -32)">
      <!-- Handle and Hammer Head combined into a single path for crisp scaling -->
      <path d="M 14 16 H 50 V 34 H 42 V 29 H 22 V 34 H 14 Z M 29 34 H 35 V 54 H 29 Z"
        fill="url(#gold)" />

      <!-- Center Rune/Rivet -->
      <circle cx="32" cy="25" r="2.5" fill="#fef3c7" />

      <!-- Handle Grip Details -->
      <rect x="29" y="40" width="6" height="1.5" fill="#7c2d12" />
      <rect x="29" y="45" width="6" height="1.5" fill="#7c2d12" />
      <rect x="29" y="50" width="6" height="1.5" fill="#7c2d12" />
    </g>
  </g>
</svg>